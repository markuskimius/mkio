port = 8080
host = "0.0.0.0"
db_path = "orders.db"
batch_max_size = 500
batch_max_wait_ms = 2.0

# --- Database schema ---

[tables.orders]
columns = { id = "INTEGER PRIMARY KEY AUTOINCREMENT", side = "TEXT NOT NULL", symbol = "TEXT NOT NULL", qty = "INTEGER", price = "REAL DEFAULT 0", status = "TEXT DEFAULT 'pending'" }

[tables.audit_log]
columns = { id = "INTEGER PRIMARY KEY AUTOINCREMENT", event = "TEXT", order_id = "INTEGER", status = "TEXT" }
append_only = true

# --- Transaction service (all order operations at one endpoint) ---
# Client sends "op" field to select which operation: "place" or "update_status"

[services.orders]
type = "transaction"

[services.orders.ops]
place = [
    { table = "orders", op_type = "insert", fields = ["side", "symbol", "qty", "price"] },
    { table = "audit_log", op_type = "insert", fields = ["event"], bind = { order_id = "$0.id", status = "$0.status" } },
]
update_status = [
    { table = "orders", op_type = "update", key = ["id"], fields = ["status"] },
    { table = "audit_log", op_type = "insert", fields = ["event"], bind = { order_id = "$0.id", status = "$0.status" } },
]

# --- Live data services ---

[services.live_orders]
type = "subpub"
primary_table = "orders"
key = "id"
filterable = ["status", "symbol"]
change_log_size = 10000

[services.audit_feed]
type = "stream"
primary_table = "audit_log"
buffer_size = 10000

[services.all_orders]
type = "query"
primary_table = "orders"
filterable = ["status", "symbol"]
change_log_size = 10000

# --- Static file serving ---

[static]
"/" = "./static"
