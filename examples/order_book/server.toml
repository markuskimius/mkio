port = 8080
host = "0.0.0.0"
db_path = "orders.db"
batch_max_size = 500
batch_max_wait_ms = 2.0

# --- Database schema ---

[tables.orders]
columns = { id = "INTEGER PRIMARY KEY AUTOINCREMENT", side = "TEXT NOT NULL", symbol = "TEXT NOT NULL", qty = "INTEGER", price = "REAL DEFAULT 0", status = "TEXT DEFAULT 'pending'" }

[tables.audit_log]
columns = { id = "INTEGER PRIMARY KEY AUTOINCREMENT", event = "TEXT", order_id = "INTEGER", status = "TEXT" }

# --- Transaction service (all order operations at one endpoint) ---

[services.orders]
protocol = "transaction"

[services.orders.ops]
new = [
    { table = "orders", op_type = "insert", fields = ["side", "symbol", "qty", "price"] },
    { table = "audit_log", op_type = "insert", defaults = { event = "new" }, bind = { order_id = "$0.id", status = "$0.status" } },
]
accept = [
    { table = "orders", op_type = "update", key = ["id"], fields = ["status"], defaults = { status = "accepted" } },
    { table = "audit_log", op_type = "insert", defaults = { event = "accepted" }, bind = { order_id = "$0.id", status = "$0.status" } },
]
reject = [
    { table = "orders", op_type = "update", key = ["id"], fields = ["status"], defaults = { status = "rejected" } },
    { table = "audit_log", op_type = "insert", defaults = { event = "rejected" }, bind = { order_id = "$0.id", status = "$0.status" } },
]
fill = [
    { table = "orders", op_type = "update", key = ["id"], fields = ["status"], defaults = { status = "filled" } },
    { table = "audit_log", op_type = "insert", defaults = { event = "filled" }, bind = { order_id = "$0.id", status = "$0.status" } },
]
cancel = [
    { table = "orders", op_type = "update", key = ["id"], fields = ["status"], defaults = { status = "cancelled" } },
    { table = "audit_log", op_type = "insert", defaults = { event = "cancelled" }, bind = { order_id = "$0.id", status = "$0.status" } },
]

# --- Live data services ---

[services.last_trade]
protocol = "subpub"
primary_table = "orders"
topic = "symbol"
where = "status == 'filled'"
change_log_size = 10000

[services.last_trade.defaults]
symbol = "_mkio_topic"
price = "0"
time = "''"

[services.last_trade.publish]
symbol = "symbol"
price = "IF(side == 'Buy', price, -price)"
time = "_mkio_ref"

# SubPub with computed topic — subscribe by "AAPL:Buy" or "MSFT:Sell"
[services.last_trade_by_side]
protocol = "subpub"
primary_table = "orders"
topic = "topic_key"
sql = "SELECT *, symbol || ':' || side AS topic_key FROM orders"
where = "status == 'filled'"

[services.last_trade_by_side.publish]
symbol = "symbol"
side = "side"
price = "price"
qty = "qty"

[services.audit_feed]
protocol = "stream"
primary_table = "audit_log"
buffer_size = 10000

[services.all_orders]
protocol = "query"
primary_table = "orders"
filterable = ["status", "symbol"]
change_log_size = 10000

# --- Request-reply services ---

# Look up a single order by id
[services.order_lookup]
protocol = "reqrep"
sql = "SELECT * FROM orders WHERE id = :id"

# Summary stats for a symbol
[services.symbol_summary]
protocol = "reqrep"
params = { symbol = "UPPER(symbol)" }
sql = "SELECT symbol, COUNT(*) as total_orders, SUM(CASE WHEN status = 'filled' THEN 1 ELSE 0 END) as filled, SUM(CASE WHEN status = 'filled' THEN qty ELSE 0 END) as filled_qty, ROUND(AVG(CASE WHEN status = 'filled' THEN price END), 2) as avg_fill_price FROM orders WHERE symbol = :symbol GROUP BY symbol"

# Compute order total from client-supplied data (no DB)
[services.order_total]
protocol = "reqrep"
reply = { subtotal = "qty * price", fee = "ROUND(qty * price * 0.001, 2)", total = "ROUND(qty * price * 1.001, 2)" }

# Count orders by status (scalar)
[services.order_count]
protocol = "reqrep"
sql = "SELECT COUNT(*) as n FROM orders WHERE status = :status"
reply = "COALESCE(n, 0)"

# --- Static file serving ---

[static]
"/" = "./static"
