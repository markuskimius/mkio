<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mkio Order Book</title>
  <script src="/mkio.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; background: #0f172a; color: #e2e8f0; }
    h1, h2 { color: #f1f5f9; }
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    th, td { border: 1px solid #334155; padding: 8px; text-align: left; }
    th { background: #1e293b; color: #94a3b8; font-weight: 600; }
    tr:hover { background: #1e293b; }
    form { display: flex; gap: 0.5rem; margin: 1rem 0; flex-wrap: wrap; }
    input, select { padding: 6px 10px; border: 1px solid #475569; border-radius: 4px; background: #1e293b; color: #e2e8f0; font-size: inherit; }
    input::placeholder { color: #64748b; }
    button { padding: 6px 14px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; }
    button:hover { background: #3b82f6; }
    #status { padding: 4px 8px; border-radius: 4px; font-size: 0.875rem; }
    .connected { background: #064e3b; color: #6ee7b7; }
    .disconnected { background: #450a0a; color: #fca5a5; }
    .side-buy { color: #60a5fa; font-weight: 600; }
    .side-sell { color: #f87171; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Order Book</h1>
  <p>Status: <span id="status" class="disconnected">Disconnected</span></p>

  <h2>Place Order</h2>
  <form id="order-form">
    <select name="side" required onchange="this.className = this.value === 'Buy' ? 'side-buy' : this.value === 'Sell' ? 'side-sell' : ''">
      <option value="">Side</option>
      <option value="Buy">Buy</option>
      <option value="Sell">Sell</option>
    </select>
    <input name="symbol" placeholder="Symbol" required autocomplete="off">
    <input name="qty" type="number" placeholder="Qty" required autocomplete="off">
    <input name="price" type="number" step="0.01" placeholder="Price" required autocomplete="off">
    <button type="submit">Place Order</button>
  </form>

  <h2>Live Orders</h2>
  <table>
    <thead>
      <tr><th>ID</th><th>Side</th><th>Symbol</th><th>Qty</th><th>Price</th><th>Status</th></tr>
    </thead>
    <tbody id="orders-body"></tbody>
  </table>

  <script>
    const statusEl = document.getElementById('status');
    const client = new MkioClient(`ws://${location.host}/ws`, {
      onConnect() {
        statusEl.textContent = 'Connected';
        statusEl.className = 'connected';
      },
      onDisconnect() {
        statusEl.textContent = 'Disconnected';
        statusEl.className = 'disconnected';
      },
    });
    const ordersMap = new Map();
    const tbody = document.getElementById('orders-body');

    function renderOrders() {
      tbody.innerHTML = '';
      for (const row of ordersMap.values()) {
        const tr = document.createElement('tr');
        const sideClass = row.side === 'Buy' ? 'side-buy' : 'side-sell';
        tr.innerHTML = `<td>${row.id}</td><td class="${sideClass}">${row.side}</td><td>${row.symbol}</td><td>${row.qty}</td><td>${row.price}</td><td>${row.status}</td>`;
        tbody.appendChild(tr);
      }
    }

    client.connect().then(() => {
      client.subscribe('live_orders', {
        onSnapshot(rows) {
          ordersMap.clear();
          rows.forEach(r => ordersMap.set(r.id, r));
          renderOrders();
        },
        onDelta(changes) {
          changes.forEach(c => {
            if (c.op === 'delete') ordersMap.delete(c.row.id);
            else ordersMap.set(c.row.id, c.row);
          });
          renderOrders();
        },
        onUpdate(op, row) {
          if (op === 'delete') ordersMap.delete(row.id);
          else ordersMap.set(row.id, row);
          renderOrders();
        },
      });
    });

    document.getElementById('order-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = {
        side: form.side.value,
        symbol: form.symbol.value,
        qty: parseInt(form.qty.value),
        price: parseFloat(form.price.value),
        event: 'order_placed',
      };
      await client.send('orders', data, { op: 'place' });
      form.reset();
      form.side.className = '';
    });
  </script>
</body>
</html>
